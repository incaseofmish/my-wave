<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Wave</title>
    <script src="p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050a19; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
    let particles = [];
    const rows = 40; 
    const cols = 60;
    let f = 0;
    let mode = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight, P2D);
      initParticles();
    }

    function initParticles() {
      particles = [];
      let xGap = width / cols;
      let yGap = height / rows;
      for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
          particles.push(new p(j * xGap + xGap / 2, i * yGap + yGap / 2));
        }
      }
    }

    function mouseClicked() {
      mode = (mode + 1) % 3;
    }

    function keyPressed() {
      if (key === 's' || key === 'S') saveCanvas('art_frame', 'png');
    }

    function draw() {
      blendMode(BLEND);
      fill(5, 10, 25, 35); 
      rect(0, 0, width, height);
      
      blendMode(ADD);
      f = frameCount * 0.02;
      for (let i = 0; i < particles.length; i++) {
        particles[i].u();
        particles[i].s();
      }
    }

    class p {
      constructor(x, y) {
        this.orig = createVector(x, y);
        this.pos = createVector(x, y);
        this.z = 0;
      }
      u() {
        let d = dist(this.orig.x, this.orig.y, mouseX, mouseY);
        let wave = sin(d * 0.01 - f) * 50;
        let strength = mode === 2 ? 65 : 20;
        let nx = noise(this.orig.x * 0.01, f) * strength;
        let ny = noise(this.orig.y * 0.01, f) * strength;
        this.pos.x = this.orig.x + cos(this.orig.y * 0.01 + f) * nx;
        this.pos.y = this.orig.y + sin(this.orig.x * 0.01 + f) * ny + wave * 0.5;
        this.z = wave; 
      }
      s() {
        let n = map(this.z, -50, 50, 0, 1);
        let r, g, b;
        if (mode === 0) {
          r = lerp(50, 255, n); g = lerp(100, 0, n); b = 255;
        } else if (mode === 1) {
          r = 255; g = lerp(50, 255, n); b = 50;
        } else {
          r = lerp(0, 255, n); g = 255; b = lerp(255, 100, n);
        }
        let sz = map(this.z, -50, 50, 2, 14);
        noStroke();
        fill(r, g, b, 200);
        ellipse(this.pos.x, this.pos.y, sz);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initParticles(); 
    }
    </script>
</body>
</html>
